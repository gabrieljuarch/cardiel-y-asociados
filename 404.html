<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Cardiel y Asociados, S.C.</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="logo navegador.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F6F4EF;
      color: #3A3A3E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .logo { height: 52px; margin-bottom: 40px; }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      color: #2A65B8;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      margin-bottom: 14px;
    }
    p {
      color: #6B6B72;
      font-size: 1rem;
      max-width: 420px;
      line-height: 1.65;
      margin-bottom: 36px;
    }
    a.btn {
      display: inline-block;
      background: #2A65B8;
      color: #fff;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px 32px;
      transition: background 0.2s;
    }
    a.btn:hover { background: #1d4f94; }
  </style>
</head>
<body>
  <img src="LOGO WEB1.png" alt="Cardiel y Asociados" class="logo">
  <p class="code">404</p>
  <h1>Página no encontrada</h1>
  <p>La dirección que buscas no existe o fue movida. Le invitamos a regresar al inicio y encontrar la información que necesita.</p>
  <a href="/" class="btn">Regresar al inicio</a>
</body>
</html>
